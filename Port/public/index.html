<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Character Encoding -->
  <meta charset="UTF-8" />

  <!-- Mobile Responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Browser Compatibility -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- Primary Title (Most Important for SEO) -->
  <title>
    Anisha Chhajer | Software Engineer | React Developer | Portfolio
  </title>

  <!-- Primary Meta Description -->
  <meta name="description"
    content="Anisha Chhajer is a Software Engineer specializing in React development. Explore projects, hackathon wins, certifications, and technical achievements." />

  <!-- Keywords (Optional, for completeness) -->
  <meta name="keywords"
    content="Anisha Chhajer, software engineer, react developer, portfolio, hackathon winner, coding projects, certifications" />

  <!-- Author -->
  <meta name="author" content="Anisha Chhajer" />

  <!-- Theme Color (Mobile Browsers) -->
  <meta name="theme-color" content="#0f172a" />

  <!-- Canonical URL (Avoid duplicate content issues) -->
  <link rel="canonical" href="http://codinggita.com/" />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" />

  <!-- Open Graph (For WhatsApp, LinkedIn, Facebook sharing) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Anisha Chhajer | Developer Portfolio" />
  <meta property="og:description"
    content="Portfolio showcasing projects, hackathons, certifications, and achievements." />
  <meta property="og:url" content="http://codinggita.com/" />
  <meta property="og:image" content="http://codinggita.com/portfolio-preview.png" />

  <!-- Twitter Card (For Twitter/X sharing) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Your Name Portfolio" />
  <meta name="twitter:description" content="Explore my projects, achievements, and certifications." />
  <meta name="twitter:image" content="http://codinggita.com/portfolio-preview.png" />

  <!-- Robots Instruction -->
  <meta name="robots" content="index, follow" />

  <!-- Structured Data (Schema.org for better indexing) -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Your Name",
        "url": "http://codinggita.com",
        "image": "http://codinggita.com/profile.jpg",
        "sameAs": [
          "https://github.com/yourprofile",
          "https://linkedin.com/in/yourprofile"
        ],
        "jobTitle": "Software Engineer",
        "alumniOf": {
          "@type": "EducationalOrganization",
          "name": "Your College Name"
        },
        "knowsAbout": [
          "React",
          "JavaScript",
          "Node.js",
          "MongoDB",
          "Frontend Development"
        ]
      }
    </script>

  <!-- Preconnect for Performance (Optional but Good Practice) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

</head>

<body>
  <!-- Root Element for React -->
  <div id="root"></div>

  <!-- Optional: Fallback content for SEO (if JS fails) -->
  <noscript>
    <h1>Your Name - Software Engineer Portfolio</h1>
    <p>
      This portfolio includes projects, hackathons, certifications, and
      achievements in software development.
    </p>
  </noscript>
</body>

</html>
